name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.ENVSECRET }}
          user: 0xvNFT
          template: classic
          base: header, activity, community, repositories
          config_timezone: Asia/Manila
          filename: github-metrics.svg

          # Notable contributions (unique — not in your current tools)
          plugin_notable: yes
          plugin_notable_indepth: yes
          plugin_notable_repositories: yes

          # Follow-up on issues/PRs (unique)
          plugin_followup: yes
          plugin_followup_sections: repositories

          # Recent activity feed (unique)
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_activity_filter: push, issue, pr, review
