name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.ENVSECRET }}
          filename: metrics.languages.svg
          user: 0xvNFT
          base: ""
          config_timezone: Asia/Manila
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_threshold: 0%
          plugin_languages_indepth: yes
          plugin_languages_analysis_timeout: 30
          plugin_languages_analysis_timeout_repositories: 15
          plugin_languages_ignored: html, css, dockerfile, makefile, shell

      - name: Habits
        uses: lowlighter/metrics@master
        with:
          token: ${{ secrets.ENVSECRET }}
          filename: metrics.habits.svg
          user: 0xvNFT
          base: ""
          config_timezone: Asia/Manila
          plugin_habits: yes
          plugin_habits_from: 10
          plugin_habits_days: 60
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_charts_type: graph
          plugin_habits_trim: yes
          plugins_errors_fatal: no

      - name: RSS
        uses: lowlighter/metrics@latest
        with:
          token: NOT_NEEDED
          filename: metrics.rss.svg
          base: ""
          plugin_rss: yes
          plugin_rss_source: https://news.ycombinator.com/rss
          plugin_rss_limit: 4

      - name: Music
        uses: lowlighter/metrics@latest
        with:
          token: NOT_NEEDED
          filename: metrics.music.svg
          base: ""
          plugin_music: yes
          plugin_music_provider: spotify
          plugin_music_mode: recent
          plugin_music_token: ${{ secrets.SPOTIFY_TOKENS }}
          plugin_music_limit: 5
          plugin_music_played_at: yes

      - name: Steam
        uses: lowlighter/metrics@latest
        with:
          token: NOT_NEEDED
          filename: metrics.steam.svg
          base: ""
          plugin_steam: yes
          plugin_steam_token: ${{ secrets.STEAM_TOKEN }}
          plugin_steam_user: "76561198257508149"
          plugin_steam_sections: player, recently-played
          plugin_steam_recent_games_limit: 3
          plugin_steam_achievements_limit: 3
