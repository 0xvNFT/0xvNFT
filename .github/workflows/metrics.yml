name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.ENVSECRET }}
          filename: metrics.languages.svg
          user: 0xvNFT
          base: ""
          config_timezone: Asia/Manila
          plugin_languages: yes
          plugin_languages_sections: most-used, recently-used
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_threshold: 0%
          plugin_languages_ignored: html, css, dockerfile, makefile, shell

      - name: Habits
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.ENVSECRET }}
          filename: metrics.habits.svg
          user: 0xvNFT
          base: ""
          config_timezone: Asia/Manila
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_charts_type: graph
          plugin_habits_trim: yes

      - name: RSS
        uses: lowlighter/metrics@latest
        with:
          token: NOT_NEEDED
          filename: metrics.rss.svg
          base: ""
          plugin_rss: yes
          plugin_rss_source: https://news.ycombinator.com/rss
          plugin_rss_limit: 4

      - name: Notable
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.ENVSECRET }}
          filename: metrics.notable.svg
          user: 0xvNFT
          base: ""
          config_timezone: Asia/Manila
          plugin_notable: yes
          plugin_notable_indepth: yes
          plugin_notable_repositories: yes

      - name: Music
        uses: lowlighter/metrics@latest
        with:
          token: NOT_NEEDED
          filename: metrics.music.svg
          base: ""
          plugin_music: yes
          plugin_music_provider: spotify
          plugin_music_mode: recent
          plugin_music_token: ${{ secrets.SPOTIFY_TOKENS }}
          plugin_music_limit: 5
          plugin_music_played_at: yes
